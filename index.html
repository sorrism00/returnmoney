<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>회수금계산기</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="계산기">
  
  <link rel="apple-touch-icon" sizes="180x180" href="/returnmoney/icon-180x180.png">
  <meta name="theme-color" content="#fdf2f8">
  <link rel="icon" type="image/png" href="/returnmoney/icon-192x192.png">
  <link rel="manifest" href="/returnmoney/manifest.json">

  <!-- 강력한 초기화 (캐시 및 이전 에러 서비스 워커 완전 삭제) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) { 
          registration.unregister(); 
        }
      });
    }
    if ('caches' in window) {
      caches.keys().then(function(names) {
        for (let name of names) { 
          caches.delete(name); 
        }
      });
    }

    // 글로벌 에러 감지기
    window.onerror = function(msg, url, lineNo, columnNo, error) {
      document.getElementById('error-screen').style.display = 'block';
      document.getElementById('error-msg').innerText = "에러: " + msg + "\n위치: " + lineNo + "\n상세: " + (error ? error.stack : '');
      return false;
    };
    window.addEventListener('unhandledrejection', function(event) {
      document.getElementById('error-screen').style.display = 'block';
      document.getElementById('error-msg').innerText = "통신/비동기 에러: " + event.reason;
    });
  </script>

  <!-- 가장 안정적인 JSDelivr CDN으로 전면 교체 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.12/babel.min.js"></script>

  <style>
    html, body {
      min-height: 100%;
      background: linear-gradient(135deg, #fff1eb 0%, #ace0f9 100%);
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    ::-webkit-scrollbar { display: none; }
    input[type='text'].no-spinner::-webkit-outer-spin-button,
    input[type='text'].no-spinner::-webkit-inner-spin-button {
      -webkit-appearance: none; margin: 0;
    }
    input[type='text'].no-spinner { -moz-appearance: textfield; }
  </style>
</head>
<body class="select-none text-slate-800">

<!-- 화면이 죽었을 때 원인을 알려주는 에러 박스 -->
<div id="error-screen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:9999; padding:20px; box-sizing:border-box; overflow-y:auto;">
  <h2 style="color:red; font-size:24px; font-weight:bold; margin-bottom:10px;">앱 실행 오류</h2>
  <p style="color:black; font-size:14px; margin-bottom:20px;">문제가 발생하여 화면을 띄울 수 없습니다.<br>아래 에러 내용을 캡처해서 알려주세요.</p>
  <div id="error-msg" style="background:#f1f1f1; padding:15px; border-radius:8px; font-family:monospace; font-size:12px; color:#e11d48; word-break:break-all; white-space:pre-wrap;"></div>
</div>

<div id="root" class="min-h-screen flex items-center justify-center">
  <div style="text-align:center; color:#64748b; font-weight:bold; font-size:16px;">
    계산기를 불러오는 중입니다...<br>
    <span style="font-size:12px; font-weight:normal; margin-top:10px; display:inline-block;">화면이 넘어가지 않으면 인터넷 연결을 확인하세요.</span>
  </div>
</div>

<!-- 라이브러리 차단 여부 검사기 -->
<script>
  setTimeout(() => {
    const rootDiv = document.getElementById('root');
    if (rootDiv && rootDiv.innerHTML.includes('불러오는 중')) {
      let missing = [];
      if (typeof React === 'undefined') missing.push('React');
      if (typeof ReactDOM === 'undefined') missing.push('ReactDOM');
      if (typeof Babel === 'undefined') missing.push('Babel');
      
      if (missing.length > 0) {
        document.getElementById('error-screen').style.display = 'block';
        document.getElementById('error-msg').innerText = "필수 스크립트 다운로드 실패: " + missing.join(', ') + "\n\n광고 차단 프로그램(AdBlock 등), 사내망 방화벽, 또는 브라우저 보안 설정에 의해 외부 라이브러리 접속이 차단되었습니다. 설정을 끄고 새로고침 해주세요.";
      }
    }
  }, 3500);
</script>

<script type="text/babel">
  // React 에러를 화면에 띄워주는 경계 컴포넌트
  class ErrorBoundary extends React.Component {
    constructor(props) {
      super(props);
      this.state = { hasError: false, error: null, errorInfo: null };
    }
    static getDerivedStateFromError(error) {
      return { hasError: true, error };
    }
    componentDidCatch(error, errorInfo) {
      this.setState({ errorInfo });
    }
    render() {
      if (this.state.hasError) {
        return (
          <div style={{padding: '20px', color: 'red', wordBreak: 'break-all'}}>
            <h2 style={{fontSize:'20px', fontWeight:'bold', marginBottom:'10px'}}>React 렌더링 오류</h2>
            <p style={{fontSize:'14px', marginBottom:'10px'}}>{this.state.error && this.state.error.toString()}</p>
            <pre style={{fontSize: '11px', color: '#555', background:'#f0f0f0', padding:'10px'}}>{this.state.errorInfo && this.state.errorInfo.componentStack}</pre>
          </div>
        );
      }
      return this.props.children;
    }
  }

  const BUNDLE_VALUES = {
    50000: 5000000, 10000: 1000000, 5000: 500000, 1000: 100000, 
    500: 50000, 100: 20000, 50: 10000, 10: 2000        
  };

  const denominations = [
    { name: '오만원', value: 50000, type: 'bill' },
    { name: '만원', value: 10000, type: 'bill' },
    { name: '오천원', value: 5000, type: 'bill' },
    { name: '천원', value: 1000, type: 'bill' },
    { name: '오백원', value: 500, type: 'coin' },
    { name: '백원', value: 100, type: 'coin' },
    { name: '오십원', value: 50, type: 'coin' },
    { name: '십원', value: 10, type: 'coin' },
  ];

  const formatCurrency = (amount) => {
    return new Intl.NumberFormat('ko-KR').format(amount);
  };

  function App() {
    const { useState, useMemo } = React;

    const [quantities, setQuantities] = useState(() =>
      denominations.reduce((acc, denom) => ({
        ...acc,
        [denom.value]: { count: '', bundle: '', looseAmountInput: '', bundleAmountInput: '' }
      }), {})
    );

    const [closingVaultAmount, setClosingVaultAmount] = useState('');
    const [coinReplenishmentAmount, setCoinReplenishmentAmount] = useState('');
    const [increaseAmount, setIncreaseAmount] = useState('');
    const [decreaseAmount, setDecreaseAmount] = useState('');

    const handleBundleCountChange = (value, denom) => {
      const cleanValue = value.replace(/[^0-9]/g, '');
      const count = parseInt(cleanValue) || 0;
      const bundleValue = count * BUNDLE_VALUES[denom.value];

      setQuantities(prev => ({
        ...prev,
        [denom.value]: {
          ...prev[denom.value],
          bundle: cleanValue,
          bundleAmountInput: bundleValue > 0 ? (bundleValue / 10000) : ''
        }
      }));
    };

    const handleBundleAmountInputChange = (value, denom) => {
      const cleanValue = value.replace(/[^0-9.]/g, '');
      const manWonInput = parseFloat(cleanValue) || 0;
      const actualAmount = manWonInput * 10000;
      const bundleUnit = BUNDLE_VALUES[denom.value];
      const calculatedCount = Math.floor(actualAmount / bundleUnit);

      setQuantities(prev => ({
        ...prev,
        [denom.value]: {
          ...prev[denom.value],
          bundle: calculatedCount > 0 ? String(calculatedCount) : '',
          bundleAmountInput: cleanValue
        }
      }));
    };

    const handleLooseCountChange = (value, denom) => {
      const cleanValue = value.replace(/[^0-9]/g, '');
      const count = parseInt(cleanValue) || 0;
      const looseValue = count * denom.value;

      setQuantities(prev => ({
        ...prev,
        [denom.value]: {
          ...prev[denom.value],
          count: cleanValue,
          looseAmountInput: looseValue > 0 ? formatCurrency(looseValue) : ''
        }
      }));
    };

    const handleLooseAmountInputChange = (value, denom) => {
      const cleanValue = value.replace(/[^0-9]/g, '');
      const inputAmount = parseInt(cleanValue) || 0;
      const calculatedCount = Math.floor(inputAmount / denom.value);

      setQuantities(prev => ({
        ...prev,
        [denom.value]: {
          ...prev[denom.value],
          count: calculatedCount > 0 ? String(calculatedCount) : '',
          looseAmountInput: cleanValue === '' ? '' : Number(cleanValue).toLocaleString()
        }
      }));
    };

    const handleClosingVaultAmountChange = (e) => setClosingVaultAmount(e.target.value.replace(/[^0-9]/g, ''));
    const handleCoinReplenishmentChange = (e) => setCoinReplenishmentAmount(e.target.value.replace(/[^0-9]/g, ''));
    const handleIncreaseChange = (e) => setIncreaseAmount(e.target.value.replace(/[^0-9]/g, ''));
    const handleDecreaseChange = (e) => setDecreaseAmount(e.target.value.replace(/[^0-9]/g, ''));

    const handleReset = () => {
      setQuantities(denominations.reduce((acc, denom) => ({ 
        ...acc, [denom.value]: { count: '', bundle: '', looseAmountInput: '', bundleAmountInput: '' } 
      }), {}));
      setClosingVaultAmount('');
      setCoinReplenishmentAmount('');
      setIncreaseAmount('');
      setDecreaseAmount('');
    };

    const totals = useMemo(() => {
      let billTotal = 0;
      let coinTotal = 0;
      denominations.forEach(denom => {
        const bundleCount = parseInt(quantities[denom.value].bundle) || 0;
        const looseCount = parseInt(quantities[denom.value].count) || 0;
        const amount = (bundleCount * BUNDLE_VALUES[denom.value]) + (looseCount * denom.value);

        if (denom.type === 'bill') billTotal += amount;
        else coinTotal += amount;
      });
      const grandTotal = billTotal + coinTotal;
      const postClosingVaultAmount = (parseInt(closingVaultAmount) || 0) + grandTotal - (parseInt(coinReplenishmentAmount) || 0) + (parseInt(increaseAmount) || 0) - (parseInt(decreaseAmount) || 0);
      return { billTotal, coinTotal, grandTotal, postClosingVaultAmount };
    }, [quantities, closingVaultAmount, coinReplenishmentAmount, increaseAmount, decreaseAmount]);

    const renderItem = (denom) => {
      const { count, bundle, bundleAmountInput, looseAmountInput } = quantities[denom.value];
      const bundleLabel = denom.type === 'bill' ? 'strap' : 'bag';
      
      return (
        <div key={denom.value} className="flex items-center justify-between border-b border-gray-100 last:border-0 hover:bg-white/50 transition-colors px-1 py-0.5 min-h-[36px]">
          <div className="w-12 flex-shrink-0 flex items-center h-full">
            <span className="text-slate-700 text-sm font-extrabold whitespace-nowrap">{denom.name}</span>
          </div>

          <div className="flex flex-1 justify-end items-center space-x-1">
            <div className="flex items-center bg-orange-100 rounded-lg px-1 py-1 border border-black shadow-sm">
               <input type="text" inputMode="numeric" value={bundle} onChange={(e) => handleBundleCountChange(e.target.value, denom)} className="w-8 h-8 text-center text-black text-base font-bold bg-white border border-gray-200 rounded shadow-sm focus:border-orange-400 outline-none p-0" />
               <span className="text-orange-800 text-[10px] font-bold ml-1 w-7 overflow-hidden leading-tight">{bundleLabel}</span>
               <div className="flex items-center justify-end w-16">
                 <input type="text" inputMode="numeric" placeholder="0" value={bundleAmountInput} onChange={(e) => handleBundleAmountInputChange(e.target.value, denom)} className="w-full text-right text-sm font-black text-orange-900 bg-transparent outline-none placeholder-orange-400" />
                 <span className="text-xs font-black text-orange-900 ml-0.5 whitespace-nowrap">만</span>
               </div>
            </div>
            <div className="flex items-center bg-yellow-100 rounded-lg px-1 py-1 border border-black shadow-sm">
               <input type="text" inputMode="numeric" value={count} onChange={(e) => handleLooseCountChange(e.target.value, denom)} className="w-8 h-8 text-center text-black text-base font-bold bg-white border border-gray-200 rounded shadow-sm focus:border-yellow-400 outline-none p-0" />
               <span className="text-yellow-800 text-[10px] font-bold ml-1 w-3 leading-tight">개</span>
               <input type="text" inputMode="numeric" placeholder="0" value={looseAmountInput} onChange
