<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>거스름돈 및 수수료 계산기</title>
    <link rel="manifest" href="/returnmoney/manifest.json">
    <link rel="apple-touch-icon" href="/returnmoney/icon-192x192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.12/babel.min.js"></script>

    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        input {
            user-select: text;
            -webkit-user-select: text;
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .safe-top {
            padding-top: env(safe-area-inset-top);
        }
    </style>
</head>
<body class="bg-gray-900 text-white antialiased min-h-screen flex flex-col safe-top safe-bottom">

    <div id="root" class="flex-1 flex flex-col h-full max-w-md mx-auto w-full bg-gray-950 shadow-2xl overflow-hidden relative"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [view, setView] = useState('change'); // 'change' 또는 'fee'
            const [input, setInput] = useState('');
            const [activeField, setActiveField] = useState('received'); // 'received' 또는 'price' (거스름돈 뷰용)
            const [receivedAmount, setReceivedAmount] = useState('');
            const [priceAmount, setPriceAmount] = useState('');
            const [feeInput, setFeeInput] = useState('');

            // Lucide 아이콘 초기화
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [view]);

            // 화폐 단위 정의
            const units = [
                { label: '5만원', value: 50000 },
                { label: '1만원', value: 10000 },
                { label: '5천원', value: 5000 },
                { label: '1천원', value: 1000 },
                { label: '5백원', value: 500 },
                { label: '1백원', value: 100 },
                { label: '5십원', value: 50 },
                { label: '1십원', value: 10 }
            ];

            // 수수료율 정의
            const feeRates = [
                { label: '3.3%', value: 0.033 },
                { label: '4.4%', value: 0.044 },
                { label: '5.5%', value: 0.055 },
                { label: '10%', value: 0.10 }
            ];

            // 키패드 입력 처리
            const handleKeyPress = (key) => {
                if (view === 'change') {
                    let current = activeField === 'received' ? receivedAmount : priceAmount;
                    
                    if (key === 'C') {
                        current = '';
                    } else if (key === '00') {
                        if (current !== '') current += '00';
                    } else if (key === 'back') {
                        current = current.slice(0, -1);
                    } else {
                        current += key;
                    }

                    if (activeField === 'received') setReceivedAmount(current);
                    else setPriceAmount(current);
                } else {
                    if (key === 'C') setFeeInput('');
                    else if (key === '00') { if (feeInput !== '') setFeeInput(feeInput + '00'); }
                    else if (key === 'back') setFeeInput(feeInput.slice(0, -1));
                    else setFeeInput(feeInput + key);
                }
            };

            // 거스름돈 계산 로직
            const calculateChange = () => {
                const received = parseInt(receivedAmount) || 0;
                const price = parseInt(priceAmount) || 0;
                let change = received - price;

                if (change <= 0) return { total: 0, details: [] };

                const totalChange = change;
                const details = [];

                units.forEach(unit => {
                    const count = Math.floor(change / unit.value);
                    if (count > 0) {
                        details.push({ label: unit.label, count });
                        change %= unit.value;
                    }
                });

                return { total: totalChange, details };
            };

            // 수수료 계산 로직
            const calculateFee = () => {
                const amount = parseInt(feeInput) || 0;
                return feeRates.map(rate => {
                    const fee = Math.floor(amount * rate.value);
                    const safeFee = Math.floor(fee / 10) * 10; // 1원단위 절사
                    return {
                        label: rate.label,
                        fee: safeFee,
                        net: amount - safeFee
                    };
                });
            };

            const changeResult = calculateChange();
            const feeResults = calculateFee();

            return (
                <div class="flex-1 flex flex-col h-full select-none">
                    {/* 상단 탭 내비게이션 */}
                    <div class="flex border-b border-gray-800 bg-gray-900 sticky top-0 z-10">
                        <button 
                            onClick={() => setView('change')}
                            class={`flex-1 py-4 text-center font-bold text-lg flex items-center justify-center gap-2 transition-colors ${view === 'change' ? 'text-emerald-400 border-b-2 border-emerald-400 bg-gray-950' : 'text-gray-400 hover:text-gray-200'}`}
                        >
                            <i data-lucide="coins" class="w-5 h-5"></i>
                            거스름돈 계산
                        </button>
                        <button 
                            onClick={() => setView('fee')}
                            class={`flex-1 py-4 text-center font-bold text-lg flex items-center justify-center gap-2 transition-colors ${view === 'fee' ? 'text-indigo-400 border-b-2 border-indigo-400 bg-gray-950' : 'text-gray-400 hover:text-gray-200'}`}
                        >
                            <i data-lucide="percent" class="w-5 h-5"></i>
                            수수료 계산
                        </button>
                    </div>

                    {/* 메인 콘텐츠 영역 (스크롤 가능) */}
                    <div class="flex-1 overflow-y-auto p-4 space-y-4 pb-72">
                        {view === 'change' ? (
                            /* 거스름돈 계산 뷰 */
                            <div class="space-y-4 animate-fade-in">
                                {/* 입력 필드 그룹 */}
                                <div class="grid grid-cols-2 gap-3">
                                    <div 
                                        onClick={() => setActiveField('received')}
                                        class={`p-3 rounded-2xl border-2 transition-all cursor-pointer ${activeField === 'received' ? 'bg-emerald-950/40 border-emerald-500 shadow-md shadow-emerald-900/20' : 'bg-gray-900 border-gray-800'}`}
                                    >
                                        <div class="text-xs text-gray-400 font-medium mb-1">받은 금액</div>
                                        <div class="text-xl font-bold truncate text-emerald-400">
                                            {receivedAmount ? parseInt(receivedAmount).toLocaleString() : '0'} <span class="text-sm text-gray-500">원</span>
                                        </div>
                                    </div>
                                    <div 
                                        onClick={() => setActiveField('price')}
                                        class={`p-3 rounded-2xl border-2 transition-all cursor-pointer ${activeField === 'price' ? 'bg-emerald-950/40 border-emerald-500 shadow-md shadow-emerald-900/20' : 'bg-gray-900 border-gray-800'}`}
                                    >
                                        <div class="text-xs text-gray-400 font-medium mb-1">상품 금액</div>
                                        <div class="text-xl font-bold truncate text-white">
                                            {priceAmount ? parseInt(priceAmount).toLocaleString() : '0'} <span class="text-sm text-gray-500">원</span>
                                        </div>
                                    </div>
                                </div>

                                {/* 결과 출력 */}
                                <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4 shadow-lg">
                                    <div class="flex justify-between items-center border-b border-gray-800 pb-3 mb-3">
                                        <span class="text-gray-400 font-medium">거스름돈 총액</span>
                                        <span class="text-2xl font-black text-amber-400">
                                            {changeResult.total.toLocaleString()} 원
                                        </span>
                                    </div>
                                    
                                    {changeResult.details.length > 0 ? (
                                        <div class="grid grid-cols-2 gap-2">
                                            {changeResult.details.map((item, idx) => (
                                                <div key={idx} class="flex justify-between items-center bg-gray-950 p-2.5 rounded-xl border border-gray-800/60">
                                                    <span class="text-sm text-gray-300 font-medium">{item.label}</span>
                                                    <span class="text-base font-bold text-emerald-400">{item.count} <span class="text-xs text-gray-500 font-normal">개</span></span>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div class="text-center py-6 text-gray-500 text-sm">
                                            금액을 입력하면 거스름돈 기표가 표시됩니다.
                                        </div>
                                    )}
                                </div>
                            </div>
                        ) : (
                            /* 수수료 계산 뷰 */
                            <div class="space-y-4 animate-fade-in">
                                {/* 원금 입력 필드 */}
                                <div class="bg-indigo-950/30 border-2 border-indigo-500 p-4 rounded-2xl shadow-lg shadow-indigo-900/10">
                                    <div class="text-xs text-indigo-300 font-semibold uppercase tracking-wider mb-1">정산 대상 금액</div>
                                    <div class="text-2xl font-black text-indigo-400 truncate">
                                        {feeInput ? parseInt(feeInput).toLocaleString() : '0'} <span class="text-base text-gray-500 font-normal">원</span>
                                    </div>
                                </div>

                                {/* 수수료율별 결과 리스트 */}
                                <div class="space-y-2.5">
                                    {feeResults.map((res, idx) => (
                                        <div key={idx} class="bg-gray-900 border border-gray-800 rounded-2xl p-3.5 flex flex-col justify-between shadow-md">
                                            <div class="flex justify-between items-center mb-1.5">
                                                <span class="bg-indigo-900/60 text-indigo-300 border border-indigo-700/50 text-xs px-2.5 py-0.5 rounded-full font-bold">{res.label}</span>
                                                <span class="text-xs text-red-400 font-medium">수수료: -{res.fee.toLocaleString()}원</span>
                                            </div>
                                            <div class="flex justify-between items-end">
                                                <span class="text-xs text-gray-400">실수령액</span>
                                                <span class="text-lg font-bold text-gray-100">{res.net.toLocaleString()} 원</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* 고정 하단 키패드 */}
                    <div class="absolute bottom-0 left-0 right-0 bg-gray-900/95 backdrop-blur-md border-t border-gray-800 p-2 grid grid-cols-4 gap-1.5 z-20 pb-safe">
                        {['7', '8', '9', 'back', '4', '5', '6', 'C', '1', '2', '3', '00', '0'].map((key) => {
                            if (key === 'back') {
                                return (
                                    <button 
                                        key={key} onClick={() => handleKeyPress(key)}
                                        class="bg-gray-800 hover:bg-gray-700 active:bg-gray-600 font-bold py-3.5 rounded-xl flex items-center justify-center text-gray-300 transition-colors"
                                    >
                                        <i data-lucide="delete" class="w-5 h-5"></i>
                                    </button>
                                );
                            }
                            if (key === 'C') {
                                return (
                                    <button 
                                        key={key} onClick={() => handleKeyPress(key)}
                                        class="bg-red-950/40 hover:bg-red-900/40 text-red-400 border border-red-900/50 font-black py-3.5 rounded-xl text-lg transition-colors"
                                    >
                                        C
                                    </button>
                                );
                            }
                            if (key === '0') {
                                return (
                                    <button 
                                        key={key} onClick={() => handleKeyPress(key)}
                                        class="col-span-2 bg-gray-800 hover:bg-gray-700 active:bg-gray-600 font-bold py-3.5 rounded-xl text-lg transition-colors"
                                    >
                                        0
                                    </button>
                                );
                            }
                            return (
                                <button 
                                    key={key} onClick={() => handleKeyPress(key)}
                                    class="bg-gray-800 hover:bg-gray-700 active:bg-gray-600 font-bold py-3.5 rounded-xl text-lg transition-colors"
                                >
                                    {key}
                                </button>
                            );
                        })}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/returnmoney/sw.js')
                    .then(reg => console.log('Service Worker 등록 성공:', reg.scope))
                    .catch(err => console.log('Service Worker 등록 실패:', err));
            });
        }
    </script>
</body>
</html>
